---
name: Release - Auto Tag

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to tag (e.g., v1.2.3)'
        required: true
        type: string
      prerelease:
        description: 'Is this a prerelease? (true/false)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: release-auto-tag
  cancel-in-progress: false

jobs:
  auto-tag:
    name: 🏷️ Auto Create Release Tag
    # Uses trust-and-skip pattern: version PR already validated code quality
    # Skips quality, build, and lighthouse jobs to avoid duplication
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    steps:
      - name: Harden Runner
        if: ${{ !env.ACT }}
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443 api.github.com:443 objects.githubusercontent.com:443
            github-releases.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            pipelines.actions.githubusercontent.com:443 bun.sh:443
            registry.npmjs.org:443

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure Git
        run: ./scripts/ci/configure-git.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.3.5"

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check version change
        id: version-check
        run: >
          ./scripts/ci/check-version-change.sh "${{ github.event.inputs.version }}"

      - name: Configure git authentication with app token
        if: >
          steps.version-check.outputs.version_changed == 'true' &&
          steps.version-check.outputs.tag_exists == 'false'
        run: |
          git config --global user.name "turbo-themes-release-bot[bot]"
          git config --global user.email "turbo-themes-release-bot[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"

      - name: Create and push release tag
        if: >
          steps.version-check.outputs.version_changed == 'true' &&
          steps.version-check.outputs.tag_exists == 'false'
        run: >
          ./scripts/ci/create-release-tag.sh "${{
          steps.version-check.outputs.current_version }}" "${{
          github.event.inputs.prerelease }}"

      - name: Generate Auto Tag Summary
        if: always()
        shell: bash
        run: ./scripts/ci/generate-auto-tag-summary.sh
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
          CURRENT_VERSION: ${{ steps.version-check.outputs.current_version }}
          VERSION_CHANGED: ${{ steps.version-check.outputs.version_changed }}
          TAG_EXISTS: ${{ steps.version-check.outputs.tag_exists }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
